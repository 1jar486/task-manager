<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHH 任务管理系统 - 森林之息</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header>
        <h1>今日清单</h1>
        <p id="current-date"></p >
    </header>

    <div class="input-section card">
        <input type="text" id="taskInput" placeholder="写下你的下一个目标..." autofocus>

        <select id="priorityInput">
            <option value="高">🔴 高</option>
            <option value="中" selected>🟡 中</option>
            <option value="低">🟢 低</option>
        </select>

        <select id="tagInput">
            <option value="学习">📚 学习</option>
            <option value="生活">🏠 生活</option>
            <option value="兼职">💰 兼职</option>
        </select>

        <button id="addBtn">添加</button>
    </div>

    <div class="stats-bar">
        <span id="taskCount">全部 0</span>
        <span id="completedCount">已完成 0</span>
    </div>

    <div class="task-board">
        <div class="board-column">
            <h2 class="column-title">📚 学习</h2>
            <div id="list-study" class="task-container"></div>
        </div>

        <div class="board-column">
            <h2 class="column-title">🏠 生活</h2>
            <div id="list-life" class="task-container"></div>
        </div>

        <div class="board-column">
            <h2 class="column-title">💰 兼职</h2>
            <div id="list-job" class="task-container"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
